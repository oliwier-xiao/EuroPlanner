name: EuroPlanner E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    # Fork PRs do not receive secrets, so the Supabase-backed E2E flow cannot run reliably.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Instalacja Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalacja zależności
        run: npm install

      - name: Instalacja przeglądarek Playwright
        run: npx playwright install --with-deps

      - name: Budowa i odpalenie kontenera
        run: |
          # Przekazujemy klucze jako --build-arg, aby Next.js mógł je 'zaszyć' w kodzie
          docker build -t europlanner \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            --build-arg SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" .
          
          docker stop europlanner || true
          docker rm europlanner || true
          
          # Uruchamiamy kontener
          docker run -d --name europlanner -p 3000:3000 --restart always \
            -e NEXT_PUBLIC_SUPABASE_URL="${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" \
            -e NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            -e SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            europlanner

      - name: Czekaj aż aplikacja wstanie
        run: |
          docker ps -a --filter "name=europlanner"

          for i in {1..60}; do
            home_code=$(curl -s -L -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/ || true)
            api_code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/api/auth/me || true)

            if { [ "$api_code" = "200" ] || [ "$api_code" = "401" ]; } && [ "$home_code" != "000" ]; then
              echo "App is ready (home: $home_code, api: $api_code)"
              exit 0
            fi

            echo "Waiting... (home: $home_code, api: $api_code)"
            sleep 2
          done

          echo "App did not start in time"
          docker logs europlanner
          exit 1

      - name: Odpalenie testów E2E
        run: npx playwright test
        env:
          BASE_URL: http://127.0.0.1:3000
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}